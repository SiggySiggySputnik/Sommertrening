name: Hold Supabase våken

# Pinger databasen mandag og torsdag kl 08:00 UTC, så den ikke pauses
# etter 7 dager uten aktivitet. Kan også kjøres manuelt.
on:
  schedule:
    - cron: "0 8 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/teams?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}"
